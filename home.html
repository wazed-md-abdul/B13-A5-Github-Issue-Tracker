<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- tailwind css cdn link -->

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome cdn link  -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- geist font cdn link  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <style>
    * {
      font-family: "Poppins", sans-serif;
    }
  </style>
</head>

<body class=" bg-[#F8FAFC]">
  <!-- nav section  -->
  <nav class="justify-between bg-white text-black p-4 flex flex-col sm:flex-row sm:px-20 shadow">
    <div class="flex items-center justify-between w-full sm:w-auto">
      <div class="flex items-center">
        <img width="40" src="./assets/github-logo.png" alt="GitHub Logo" class="inline-block mr-2">
        <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
      </div>

    </div>
    <div class="flex flex-col sm:flex-row items-center gap-4 mt-4 sm:mt-0 w-full sm:w-auto">
      <label class="input w-full sm:w-auto">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </g>
        </svg>
        <input id="search-boxs" type="search" required placeholder="Search Issues... " class="w-full" />
      </label>
      <button class="btn btn-primary w-full sm:w-auto"> <i class="fa-solid fa-plus"></i>New Issue</button>
    </div>
  </nav>
  <!-- catagory section  -->
  <section class="container max-w-[75%] w-full mx-auto p-4">
    <div class="flex flex-col sm:flex-row justify-start items-center gap-3 my-4 bg-white p-4 rounded-lg shadow">
      <button id="all-btn" onclick="allIssues()" class="btn btn-primary w-full sm:w-auto">All</button>
      <button id="open-btn" onclick="openIssues() " class="btn w-full sm:w-auto">Open</button>
      <button id="closed-btn" onclick="closedIssues()" class="btn w-full sm:w-auto">Closed</button>
    </div>

  </section>
  <!-- small status  -->
  <section
    class="container max-w-7xl w-full mx-auto p-4  bg-white rounded-lg shadow flex flex-col  md:flex-row justify-between ">
    <div class="flex flex-row items-center sm:gap-3 gap-4">
      <div class="bg-primary/30 rounded-full flex p-2 md:p-3">
        <img class="w-8 h-8 " src="./assets/Aperture.png" alt="" />
      </div>
      <div class="flex flex-col">
        <h1 class=" font-medium"> <span id="issues-counter">50</span> issues</h1>
        <p class="text-gray-500 text-[12px]">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex gap-1 items-center justify-center sm:justify-end text-[12px] ">
      <div class="w-4 h-4 bg-success rounded-full"></div>
      <h1> Opened</h1>
      <div class="w-4 h-4 bg-primary/80 rounded-full"></div>
      <h1> Closed</h1>
    </div>
  </section>
  <!-- cards section  -->
  <section>
    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div id="details-container" class="modal-box">
    
    </div>
  </div>
</dialog>
    <section id="loading-section" class="  text-center py-30  hidden">

      <span class="loading loading-spinner text-primary"> loading</span>

    </section>
    <section id="cards-section"
      class="container max-w-7xl w-full mx-auto p-4  bg-white rounded-lg shadow mt-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 ">

    </section>
  </section>
  <script src="./scripts/home.js"></script>
</body>

</html>
