<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind css cdn link -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn link  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- geist font cdn link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: "Poppins", sans-serif;
        }
    </style>

</head>

<body>
    <section class="container mx-auto">
        <div
            class="w-full md:w-1/2 lg:w-1/3 xl:w-[32%] h-auto border-2 border-gray-300 rounded-lg shadow-lg mt-4 sm:mt-6 md:mt-8 lg:mt-10 mx-auto p-4 sm:p-6 md:p-8 lg:p-10 flex flex-col items-center ">
            <img class="" src="./assets/github-logo.png" alt="GitHub Logo">

            <h1 class=" my-4 text-3xl font-bold text-center">GitHub Issues Tracker</h1>
            <p class="text-gray-600 mb-5">Sign in to manage your issues</p>
            <div class="w-full">
                <form action="" class="flex flex-col gap-3">
                    <p>Username</p>
                    <input id="username" maxlength="5" minlength="5" type="text" placeholder="Enter Username"
                        class="input input-bordered w-full">
                    <p class="text-primary">Default: admin</p>
                    <p>Password</p>
                    <input id="password" maxlength="8" minlength="8" type="password" placeholder="Password"
                        class="input input-bordered w-full">
                    <button type="button" onclick="loginFunction()" class="btn btn-primary w-full">Sign In</button>
                    <p class="text-primary">Default: admin123</p>
                </form>


                <div class="flex items-center my-4">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="mx-4 flex-shrink text-gray-600 text-sm font-medium">OR</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>
            </div>
            <p class=" text-gray-500 text-[14px] my-5">Demo Credentials:</p>
            <div class=" w-full  bg-[#F8FAFC] flex flex-col items-center  p-4 rounded-lg ">

                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>

    </section>
    <script src="/scripts/login.js "></script>
</body>

</html>
